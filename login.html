<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReaderApp - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>

    <div class="login-container">
        <!-- Logo y nombre de la app -->
        <div class="auth-brand">
            <img src="assets/logo.png" alt="Logo Constelación" class="auth-brand-logo">
            <span class="auth-brand-name">Constelación de Libros</span>
        </div>
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario o Correo</label>
                    <input type="text" id="username" required placeholder="usuario@correo.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Ingresar
                </button>
            </form>
            <p class="register-prompt">
                ¿No tienes cuenta? <a href="registro.html" class="register-link">Regístrate aquí</a>
            </p>
            <div class="divider">
                o
            </div>
            <div class="google-login-container">
                <div id="g_id_onload"
                     data-client_id="812541557311-o1cilo6kob61feb3qhpjfsbtbl3sjbsm.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
