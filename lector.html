<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Libros - Constelación de Libros</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        /* Estilos específicos del Lector */
        .reader-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-color);
        }

        .reader-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            z-index: 10;
        }

        .reader-title-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .reader-title-area h3 {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .reader-progress-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .reader-progress-area input {
            width: 60px;
            padding: 0.3rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            outline: none;
        }

        .reader-content {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        #epub-area {
            width: 100%;
            max-width: 800px;
            height: 90%;
            background-color: #ffffff;
            color: #333333;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 1.5rem;
            position: relative;
            display: none;
        }

        /* Contenedor interno donde Epub.js dibuja el texto */
        #epub-viewer {
            width: 100%;
            height: 100%;
        }

        .epub-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 0.75rem;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .epub-nav-btn:hover {
            background-color: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }

        .epub-nav-btn.prev {
            left: 1rem;
        }

        .epub-nav-btn.next {
            right: 1rem;
        }

        /* --- Ajustes responsivos internos del Lector (Móvil) --- */
        @media (max-width: 767px) {
            .reader-header {
                padding: 0.5rem 0.75rem;
            }

            .reader-title-area h3 {
                max-width: 110px;
                font-size: 0.9rem;
            }

            .reader-progress-area {
                font-size: 0.8rem;
                gap: 0.25rem;
            }

            .reader-progress-area input {
                width: 45px;
                padding: 0.2rem;
            }

            #epub-area {
                height: 95%;
                padding: 0.5rem;
                border-radius: 0;
            }

            .epub-nav-btn {
                top: auto;
                bottom: 15px;
                transform: none;
                padding: 0.5rem;
            }
            .epub-nav-btn:hover {
                transform: scale(1.1);
            }
            .epub-nav-btn.prev { left: 15px; }
            .epub-nav-btn.next { right: 15px; }
        }
    </style>
</head>
<body>

    <div class="reader-container">
        <header class="reader-header">
            <div class="reader-title-area">
                <button id="back-btn" class="icon-btn">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h3 id="book-title">Título del Libro</h3>
            </div>
            
            <div class="reader-progress-area">
                <label for="page-input">Página:</label>
                <input type="number" id="page-input" min="0" value="0">
                <button id="btn-save-progress" class="btn-primary" style="padding: 0.35rem 0.85rem; font-size: 0.8rem;">
                    Guardar
                </button>
            </div>
        </header>

        <main class="reader-content">
            <iframe id="pdf-frame" src=""></iframe>

            <div id="epub-area">
                <button id="epub-prev" class="epub-nav-btn prev">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                
                <div id="epub-viewer"></div>

                <button id="epub-next" class="epub-nav-btn next">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <script src="js/api.js"></script>
    <script src="js/lector.js"></script>
</body>
</html>
