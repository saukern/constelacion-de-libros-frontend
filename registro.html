<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReaderApp - Registrarse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/registro.css">

</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Crear Cuenta</h2>
            <form id="registro-form">
                <div class="form-group">
                    <label for="reg-username">Nombre de Usuario</label>
                    <input type="text" id="reg-username" required placeholder="Ej: lector_viajero">
                </div>
                <div class="form-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Registrarse
                </button>
            </form>
            <p class="register-prompt">
                ¿Ya tienes una cuenta? <a href="login.html" class="register-link">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <script src="js/registro.js"></script>
</body>
</html>
