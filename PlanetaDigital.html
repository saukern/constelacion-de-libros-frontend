<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constelación de Libros</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <button id="menu-toggle" class="icon-btn">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="logo">
                <img src="assets/logo.png" alt="Logo Constelación" class="logo-img">
                Constelación de libros
            </div>
        </div>
        
        <div class="nav-right">
            <button id="upload-btn" class="btn-primary">
                <span class="material-symbols-outlined">upload_file</span> 
                <span class="text-desktop">Subir Libro</span>
            </button>
            <button id="logout-btn" class="btn-secondary">
                <span class="material-symbols-outlined">logout</span> 
                <span class="text-desktop">Salir</span>
            </button>
        </div>
    </header>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Géneros</h3>
            <button id="close-sidebar" class="icon-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <ul class="genre-list">
            <li><a href="#" class="genre-item active" data-genre="todos">✨ Todos los libros</a></li>
            <li><a href="#" class="genre-item" data-genre="Ficción">🚀 Ficción</a></li>
            <li><a href="#" class="genre-item" data-genre="Fantasía">🔮 Fantasía</a></li>
            <li><a href="#" class="genre-item" data-genre="Ciencia Ficción">🌌 Ciencia Ficción</a></li>
            <li><a href="#" class="genre-item" data-genre="Misterio">🕵️‍♂️ Misterio</a></li>
            <li><a href="#" class="genre-item" data-genre="No Ficción">📖 No Ficción</a></li>
        </ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <main class="main-content">
        <h2 id="section-title">Mi Biblioteca Personal</h2>
        
        <div class="library-tabs">
            <button class="tab-btn active" data-tab="todos">
                <span class="material-symbols-outlined">grid_view</span>
                Todos los Archivos
            </button>
            <button class="tab-btn" data-tab="libros">
                <span class="material-symbols-outlined">book</span>
                Mis Libros
            </button>
            <button class="tab-btn" data-tab="documentos">
                <span class="material-symbols-outlined">description</span>
                Mis Documentos
            </button>
            <button class="tab-btn" data-tab="descubrir">
                <span class="material-symbols-outlined">language</span>
                Descubrir Gutenberg
            </button>
        </div>

        <section id="books-grid" class="books-grid"></section>

        <div id="discover-area" class="discover-area" style="display: none;">
            <div class="search-bar-container">
                <input type="text" id="search-input" placeholder="Buscar libros por título o autor en Gutenberg...">
                <button id="search-btn" class="btn-primary">
                    <span class="material-symbols-outlined">search</span>
                    Buscar
                </button>
            </div>
            <h3 id="discover-title" style="font-size: 1.2rem; font-weight: 600; color: var(--text-main); margin-top: 0.5rem;">Libros Populares</h3>
            <div id="discover-results" class="books-grid"></div>
        </div>
    </main>

    <div id="upload-modal" class="modal">
        <div class="modal-header">
            <h3>Subir Archivo</h3>
            <button id="close-modal" class="icon-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form id="upload-form">
            <div class="form-group">
                <label for="upload-tipo">Tipo</label>
                <select id="upload-tipo" required>
                    <option value="libro">Libro</option>
                    <option value="documento">Documento</option>
                </select>
            </div>
            <div class="form-group">
                <label for="upload-titulo">Título*</label>
                <input type="text" id="upload-titulo" required placeholder="Ej: Las Crónicas de Narnia">
            </div>
            
            <div id="group-libro">
                <div class="form-group">
                    <label for="upload-autor">Autor</label>
                    <input type="text" id="upload-autor" placeholder="Ej: C.S. Lewis">
                </div>
                <div class="form-group">
                    <label for="upload-genero">Género</label>
                    <input type="text" id="upload-genero" placeholder="Ej: Fantasía">
                </div>
            </div>

            <div id="group-documento" style="display: none;">
                <div class="form-group">
                    <label for="upload-materia">Materia</label>
                    <input type="text" id="upload-materia" placeholder="Ej: Tecnologías Web">
                </div>
                <div class="form-group">
                    <label for="upload-tipo-doc">Tipo de Documento</label>
                    <select id="upload-tipo-doc">
                        <option value="OTRO">Otro</option>
                        <option value="DIAPOSITIVAS">Diapositivas</option>
                        <option value="TAREA">Tarea</option>
                        <option value="NOTAS">Notas</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="upload-archivo">Archivo (PDF, EPUB)*</label>
                <input type="file" id="upload-archivo" accept=".pdf,.epub" required>
            </div>
            <div class="form-group">
                <label for="upload-portada">Portada (Imagen)</label>
                <input type="file" id="upload-portada" accept="image/*">
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-cancelar-upload" class="btn-secondary">Cancelar</button>
                <button type="submit" class="btn-primary">Subir Archivo</button>
            </div>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/codigo.js"></script>
</body>
</html>
